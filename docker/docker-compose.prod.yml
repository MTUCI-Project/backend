services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: mtuici-backend:latest
    container_name: mtuici-backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/db?schema=public
      MONGODB_URL: mongodb://admin:admin123@mongo:27017/db?authSource=admin
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_started
      mongo:
        condition: service_started
      minio:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility, compute, video]
    volumes:
      - ../logs:/app/logs

  postgres:
    image: postgres:15
    container_name: mtuici-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: db
    ports:
      - "5432:5432"
    volumes:
      - ../docker/data/postgres:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    container_name: mtuici-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: db
    ports:
      - "27017:27017"
    volumes:
      - ../docker/data/mongo:/data/db

  minio:
    image: minio/minio
    container_name: mtuici-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    volumes:
      - ../docker/data/minio:/data

  adminer:
    image: adminer
    container_name: mtuici-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"